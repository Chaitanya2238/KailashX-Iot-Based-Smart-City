[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_filters = default
monitor_rts = 0
monitor_dtr = 0
upload_port = COM4
upload_speed = 115200

; Enable PSRAM support
board_build.arduino.memory_type = qio_qspi
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps = 
    ArduinoJson
    knolleary/PubSubClient@^2.8
