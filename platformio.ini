[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_port = COM5
upload_speed = 115200

; Minimal build for stability - NO WiFi, MQTT, or SSL
board_build.arduino.memory_type = qio_qspi
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Keep ONLY what we need
lib_deps = 
    ArduinoJson@^7.0
